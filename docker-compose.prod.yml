services:
  postgres:
    image: postgres:16
    container_name: zhihu_alpha_db_prod
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: creator_assistant
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: zhihu_alpha_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: zhihu-backend:${DEPLOY_VERSION:-latest}
    container_name: zhihu_alpha_backend_prod
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://creator:${POSTGRES_PASSWORD}@postgres:5432/creator_assistant
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  frontend:
    image: zhihu-frontend:${DEPLOY_VERSION:-latest}
    container_name: zhihu_alpha_frontend_prod
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  internal:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
