# 宿主机 Nginx HTTPS 反向代理配置
# 安装：sudo cp nginx-host.conf /etc/nginx/sites-available/zhihu_alpha
#       sudo ln -s /etc/nginx/sites-available/zhihu_alpha /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name zppy.funnytop.club;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zppy.funnytop.club;

    ssl_certificate /etc/letsencrypt/live/zppy.funnytop.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zppy.funnytop.club/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE support
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
}
