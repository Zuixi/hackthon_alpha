services:
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/postgres:16-linuxarm64
    container_name: zhihu_alpha_db
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: password
      POSTGRES_DB: creator_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/redis:7-alpine
    container_name: zhihu_alpha_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: zhihu_alpha_backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://creator:password@postgres:5432/creator_assistant
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://frontend:5173,http://localhost:${BACKEND_PORT:-8000}
      BYPASS_OAUTH_LOGIN: ${BYPASS_OAUTH_LOGIN:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: zhihu_alpha_frontend
    environment:
      VITE_API_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_BYPASS_OAUTH_LOGIN: ${BYPASS_OAUTH_LOGIN:-false}
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
